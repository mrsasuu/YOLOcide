<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 20px 24px; }
  .row { display: flex; align-items: flex-end; gap: 20px; }
  .sw { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .bar { background: #6c5ce7; width: 28px; border-radius: 4px 4px 0 0; }
  .name { font: 600 12px/1 var(--font-text); }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="bar" style="height:4px"></div><div class="name">1</div><div class="meta">4</div></div>
    <div class="sw"><div class="bar" style="height:8px"></div><div class="name">2</div><div class="meta">8</div></div>
    <div class="sw"><div class="bar" style="height:12px"></div><div class="name">3</div><div class="meta">12</div></div>
    <div class="sw"><div class="bar" style="height:16px"></div><div class="name">4</div><div class="meta">16</div></div>
    <div class="sw"><div class="bar" style="height:20px"></div><div class="name">5</div><div class="meta">20</div></div>
    <div class="sw"><div class="bar" style="height:24px"></div><div class="name">6</div><div class="meta">24</div></div>
    <div class="sw"><div class="bar" style="height:32px"></div><div class="name">8</div><div class="meta">32</div></div>
    <div class="sw"><div class="bar" style="height:40px"></div><div class="name">10</div><div class="meta">40</div></div>
    <div class="sw"><div class="bar" style="height:48px"></div><div class="name">12</div><div class="meta">48</div></div>
  </div>
</body>
</html>
