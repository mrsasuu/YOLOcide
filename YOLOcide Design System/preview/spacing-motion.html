<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 18px 24px; }
  .rows { display: flex; flex-direction: column; gap: 12px; }
  .row { display: grid; grid-template-columns: 130px 1fr 130px; gap: 14px; align-items: center; }
  .label { font: 600 13px/1 var(--font-text); }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg3); text-align: right; }
  .track { height: 10px; border-radius: 999px; background: rgba(108,92,231,0.10); position: relative; overflow: hidden; }
  .bead { position: absolute; top: -4px; width: 18px; height: 18px; border-radius: 999px; background: #6c5ce7; box-shadow: 0 4px 10px rgba(108,92,231,0.35); }
  @keyframes spring { 0%{left:0%} 60%{left:calc(100% - 18px)} 72%{left:calc(94% - 18px)} 100%{left:calc(100% - 18px)} }
  @keyframes soft   { 0%{left:0%} 100%{left:calc(100% - 18px)} }
  @keyframes spin   { 0%{left:0%} 100%{left:calc(100% - 18px)} }
  .b1 { animation: spring 1.4s var(--ease-spring) infinite alternate; }
  .b2 { animation: soft   1.8s var(--ease-spring-soft) infinite alternate; }
  .b3 { animation: spin   2.6s var(--ease-out) infinite alternate; }
</style>
</head>
<body>
  <div class="rows">
    <div class="row"><div class="label">Spring</div><div class="track"><div class="bead b1"></div></div><div class="meta">(0.34, 1.56, 0.64, 1)</div></div>
    <div class="row"><div class="label">Soft spring</div><div class="track"><div class="bead b2"></div></div><div class="meta">(0.22, 1, 0.36, 1)</div></div>
    <div class="row"><div class="label">Wheel ease-out</div><div class="track"><div class="bead b3"></div></div><div class="meta">(0.16, 1, 0.3, 1)</div></div>
  </div>
</body>
</html>
