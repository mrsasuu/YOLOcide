<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 20px 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .chip { width: 78px; height: 78px; background: #fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08), var(--shadow-md); }
  .name { font: 600 12px/1 var(--font-text); }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg3); }
  .star { color: #6c5ce7; font: 700 11px/1 var(--font-text); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="border-radius:6px"></div><div class="name">xs</div><div class="meta">6px</div></div>
    <div class="sw"><div class="chip" style="border-radius:10px"></div><div class="name">sm</div><div class="meta">10px</div></div>
    <div class="sw"><div class="chip" style="border-radius:14px"></div><div class="name">md</div><div class="meta">14px</div><div class="star">Option pill</div></div>
    <div class="sw"><div class="chip" style="border-radius:20px"></div><div class="name">lg</div><div class="meta">20px</div></div>
    <div class="sw"><div class="chip" style="border-radius:28px"></div><div class="name">xl</div><div class="meta">28px</div></div>
    <div class="sw"><div class="chip" style="border-radius:999px"></div><div class="name">pill</div><div class="meta">999</div><div class="star">Primary CTA</div></div>
  </div>
</body>
</html>
