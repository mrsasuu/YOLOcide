<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Option Row</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 18px 24px; display: flex; flex-direction: column; gap: 10px; }
  .pill {
    display: grid; grid-template-columns: 1fr auto; align-items: center;
    padding: 14px 16px 14px 18px; border-radius: 14px;
    background: rgba(255,255,255,0.72);
    -webkit-backdrop-filter: blur(20px) saturate(1.4); backdrop-filter: blur(20px) saturate(1.4);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06), 0 1px 2px rgba(16,16,32,0.04);
    font: 500 17px/22px var(--font-text); color: var(--fg1);
  }
  .pill.dark {
    background: rgba(255,255,255,0.10);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    color: #f2f2f7;
  }
  .wrap-dark { background: #3a3d4a; padding: 10px 12px; border-radius: 14px; }
  .dot { width: 18px; height: 18px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
</style>
</head>
<body>
  <div class="pill"><span>Tacos</span><span class="dot" style="background:#ffd4b8"></span></div>
  <div class="pill"><span>Sushi</span><span class="dot" style="background:#bfeed6"></span></div>
  <div class="wrap-dark">
    <div class="pill dark"><span>Call it off</span><span class="dot" style="background:rgba(255,193,208,0.7)"></span></div>
  </div>
</body>
</html>
