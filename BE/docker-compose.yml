services:
  postgres:
    image: postgres:16-alpine
    container_name: yolocide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yolocide
      POSTGRES_PASSWORD: yolocide
      POSTGRES_DB: yolocide
    ports:
      - "5432:5432"
    volumes:
      - yolocide_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yolocide -d yolocide"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yolocide_pgdata:
