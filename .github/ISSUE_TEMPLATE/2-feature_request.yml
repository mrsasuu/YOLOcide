name: Feature request
description: Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check if a similar request already exists in [open issues](../../issues).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need or pain point. "I'm always frustrated when…"
      placeholder: When I have more than N options, I can't easily…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Describe the user experience, not just the implementation.
    validations:
      required: true

  - type: textarea
    id: visual_reference
    attributes:
      label: Visual reference
      description: |
        Mockups, sketches, screenshots from other apps, or any visual that illustrates the idea.
        Drag and drop files directly into this field.

        **Tip:** Even a rough sketch photo goes a long way.
      placeholder: Drag and drop mockups or reference images here…

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of the app does this affect?
      options:
        - Wheel (spinning, segments, animation)
        - Options management (add, edit, delete, colors)
        - Rank mode
        - History
        - Settings (language, appearance, haptics)
        - Design / visual polish
        - Accessibility
        - Backend / sync
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: textarea
    id: design_notes
    attributes:
      label: Design notes
      description: |
        Thoughts on how this fits the YOLOcide aesthetic — pastel palette, spring animations, `#6c5ce7` accent, fatalistic voice ("Fate has spoken"), etc.

  - type: checkboxes
    id: success_criteria
    attributes:
      label: Success criteria
      description: Check all that apply — what does "done" look like for this feature?
      options:
        - label: Works in light and dark mode
        - label: Works in both English and Spanish
        - label: Animates with spring motion (no flat fades)
        - label: Haptics gated behind the haptics setting
        - label: Saved to history where relevant

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, references, or anything else relevant.
