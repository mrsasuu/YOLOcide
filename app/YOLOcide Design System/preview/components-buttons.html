<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .sw { display: flex; flex-direction: column; gap: 10px; }
  .label { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--fg3); }
  .btn-primary {
    background: #6c5ce7; color: #fff; border: 0;
    font: 600 17px/22px var(--font-text);
    padding: 16px 22px; border-radius: 999px; width: 100%;
    box-shadow: 0 8px 20px rgba(108,92,231,0.28), inset 0 1px 0 rgba(255,255,255,0.22);
    cursor: pointer;
  }
  .btn-secondary {
    background: transparent; color: var(--fg1); border: 0;
    font: 500 15px/20px var(--font-text);
    padding: 10px 14px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-secondary .chev { width: 14px; height: 14px; }
  .btn-icon {
    width: 44px; height: 44px; border-radius: 999px; background: rgba(255,255,255,0.72);
    -webkit-backdrop-filter: blur(18px) saturate(1.3); backdrop-filter: blur(18px) saturate(1.3);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 2px 6px rgba(30,24,70,0.06);
    display: grid; place-items: center; border: 0; cursor: pointer;
  }
  .row { display: flex; gap: 10px; align-items: center; }
</style>
</head>
<body>
  <div class="sw">
    <div class="label">Primary — "Spin my fate"</div>
    <button class="btn-primary">Spin my fate</button>
  </div>
  <div class="sw">
    <div class="label">Secondary + Icon</div>
    <div class="row">
      <button class="btn-secondary">Show options
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <button class="btn-icon" aria-label="Add option">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      </button>
    </div>
  </div>
</body>
</html>
