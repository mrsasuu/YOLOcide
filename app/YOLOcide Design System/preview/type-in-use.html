<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Type In-Use</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: center; }
  .wheel-label {
    background: #c8bfff; color: #fff;
    font: 700 15px/18px var(--font-display); letter-spacing: -0.01em;
    padding: 10px 18px; border-radius: 999px; display: inline-block;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
  }
  .cap {
    width: 110px; height: 110px; border-radius: 999px; display: grid; place-items: center; margin: 0 auto;
    background: rgba(255,255,255,0.85);
    -webkit-backdrop-filter: blur(18px) saturate(1.4); backdrop-filter: blur(18px) saturate(1.4);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.9), inset 0 -1px 3px rgba(0,0,0,0.06), 0 4px 14px rgba(60,40,140,0.12);
    color: #6c5ce7; font: 700 24px/1 var(--font-display); letter-spacing: -0.02em;
  }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--fg3); margin-top: 10px; text-align: center; }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <div class="col">
    <div class="wheel-label">Tacos</div>
    <div class="meta">Wheel slice label · white · 700 / 15</div>
  </div>
  <div class="col">
    <div class="cap">Spin!</div>
    <div class="meta">Center cap · purple · 700 / 24</div>
  </div>
</body>
</html>
