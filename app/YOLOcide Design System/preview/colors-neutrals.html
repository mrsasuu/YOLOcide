<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 18px 20px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mode {
    border-radius: 18px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .mode.light { background: #f4f4f7; color: #1c1c1e; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .mode.dark  { background: #3a3d4a; color: #f2f2f7; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  .mode-label { font: 700 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.55; }
  .row { display: grid; grid-template-columns: 18px 1fr auto; gap: 10px; align-items: center; }
  .dot { width: 14px; height: 14px; border-radius: 4px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
  .mode.dark .dot { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15); }
  .name { font: 600 12px/1.1 var(--font-text); }
  .hex  { font-family: ui-monospace, Menlo, monospace; font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="cols">
    <div class="mode light">
      <div class="mode-label">Light</div>
      <div class="row"><div class="dot" style="background:#f4f4f7"></div><div class="name">Canvas</div><div class="hex">#F4F4F7</div></div>
      <div class="row"><div class="dot" style="background:#ffffff"></div><div class="name">Elevated</div><div class="hex">#FFFFFF</div></div>
      <div class="row"><div class="dot" style="background:#1c1c1e"></div><div class="name">Label 1</div><div class="hex">#1C1C1E</div></div>
      <div class="row"><div class="dot" style="background:#48484a"></div><div class="name">Label 2</div><div class="hex">#48484A</div></div>
      <div class="row"><div class="dot" style="background:#8e8e93"></div><div class="name">Label 3</div><div class="hex">#8E8E93</div></div>
    </div>
    <div class="mode dark">
      <div class="mode-label">Dark</div>
      <div class="row"><div class="dot" style="background:#3a3d4a"></div><div class="name">Canvas</div><div class="hex">#3A3D4A</div></div>
      <div class="row"><div class="dot" style="background:#454856"></div><div class="name">Elevated</div><div class="hex">#454856</div></div>
      <div class="row"><div class="dot" style="background:#f2f2f7"></div><div class="name">Label 1</div><div class="hex">#F2F2F7</div></div>
      <div class="row"><div class="dot" style="background:#c7c7cc"></div><div class="name">Label 2</div><div class="hex">#C7C7CC</div></div>
      <div class="row"><div class="dot" style="background:#98989f"></div><div class="name">Label 3</div><div class="hex">#98989F</div></div>
    </div>
  </div>
</body>
</html>
