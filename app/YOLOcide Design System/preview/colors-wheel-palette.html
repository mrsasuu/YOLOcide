<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Wheel Palette</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 20px 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip {
    height: 68px; border-radius: 14px; position: relative;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font: 700 15px/1 var(--font-display); letter-spacing: -0.01em;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
  }
  .chip::after {
    /* thin white divider motif — a tilted hairline to hint at segment separators */
    content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 1.5px;
    background: #fff; opacity: 0.85;
  }
  .name  { font: 600 13px/1 var(--font-text); color: var(--fg1); }
  .hex   { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#c8bfff">Lavender</div><div class="name">Lavender</div><div class="hex">#C8BFFF</div></div>
    <div class="sw"><div class="chip" style="background:#bfdcff">Sky</div><div class="name">Sky</div><div class="hex">#BFDCFF</div></div>
    <div class="sw"><div class="chip" style="background:#bfeed6">Mint</div><div class="name">Mint</div><div class="hex">#BFEED6</div></div>
    <div class="sw"><div class="chip" style="background:#ffd4b8">Peach</div><div class="name">Peach</div><div class="hex">#FFD4B8</div></div>
    <div class="sw"><div class="chip" style="background:#ffc1d0">Rose</div><div class="name">Rose</div><div class="hex">#FFC1D0</div></div>
    <div class="sw"><div class="chip" style="background:#d8b8ff">Violet</div><div class="name">Violet</div><div class="hex">#D8B8FF</div></div>
  </div>
</body>
</html>
