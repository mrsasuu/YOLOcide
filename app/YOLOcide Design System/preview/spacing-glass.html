<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Glass</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: transparent; overflow: hidden; margin: 0; }
  body { padding: 16px 24px; }
  .stage {
    position: relative; border-radius: 18px; overflow: hidden; height: 140px;
    display: grid; place-items: center;
    background:
      linear-gradient(120deg, #ffd4b8 0 20%, #ffc1d0 20% 40%, #d8b8ff 40% 60%, #bfdcff 60% 80%, #bfeed6 80% 100%);
  }
  .glass {
    background: rgba(255,255,255,0.72);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    backdrop-filter: blur(20px) saturate(1.4);
    border-radius: 14px;
    padding: 14px 20px;
    font: 700 16px/1 var(--font-display); color: #6c5ce7;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55), 0 6px 18px rgba(30,24,70,0.10);
  }
  .cap {
    position: absolute; right: 18px; bottom: 14px; width: 72px; height: 72px; border-radius: 999px;
    background: rgba(255,255,255,0.82);
    -webkit-backdrop-filter: blur(22px) saturate(1.5); backdrop-filter: blur(22px) saturate(1.5);
    display: grid; place-items: center; color: #6c5ce7; font: 700 16px/1 var(--font-display);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.9), inset 0 -1px 3px rgba(0,0,0,0.06);
  }
  .meta { margin-top: 10px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="stage">
    <div class="glass">Spin my fate</div>
    <div class="cap">Spin!</div>
  </div>
  <div class="meta">Frosted white · blur(20px) saturate(1.4) · rgba(255,255,255,0.72)</div>
</body>
</html>
